name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: swift build & test (Ubuntu)
    runs-on: ubuntu-latest
    # Run inside the official Swift image instead of swift-actions/setup-swift.
    # That action has no Node 24 release (every tag still declares using: node20),
    # so it can't be bumped off the deprecated runtime. The container ships the
    # toolchain directly, removing the only Node-based Swift-setup action; the
    # one remaining JS action (checkout) is on node24 below.
    container: swift:5.10
    steps:
      - uses: actions/checkout@v5

      # The swift image is a minimal toolchain and does NOT ship the SQLite
      # development headers; GRDB's CSQLite module needs <sqlite3.h>. The old
      # ubuntu-latest runner had libsqlite3-dev preinstalled — the container
      # doesn't, so install it explicitly. (Container runs as root: no sudo.)
      - name: Install SQLite dev headers
        run: apt-get update && apt-get install -y libsqlite3-dev

      # Build only the kit target — TimeTrackApp depends on HotKey/AppKit and
      # cannot compile on Linux.  The test step implicitly rebuilds the kit.
      - name: Build TimeTrackKit
        run: swift build --target TimeTrackKit

      # Build the CLI target — it depends only on TimeTrackKit and Foundation,
      # so it must compile on Linux (no AppKit/HotKey/Combine).
      - name: Build timetrack CLI
        run: swift build --target timetrack-cli

      # swift test builds TimeTrackKitTests (+ its TimeTrackKit dep) and runs
      # all test cases.  It does NOT build TimeTrackApp or timetrack-cli.
      - name: Run tests
        run: swift test
