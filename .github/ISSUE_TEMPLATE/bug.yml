name: Bug report
description: Report a defect in TimeTrack
title: "[Bug]: "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. The **Acceptance Criteria** section at the bottom is the
        contract the coding agent implements against — please make it concrete and testable.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-paragraph description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably trigger the bug.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs actual
      description: What you expected to happen, and what actually happened.
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: macOS version, app or CLI build / commit SHA, relevant config.
      placeholder: |
        - macOS: 14.x
        - Build / commit: ...
        - Surface: app or timetrack-cli
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "✅ Acceptance Criteria"
      description: >-
        The definition of done — concrete, testable conditions the fix must satisfy.
        This is the contract the implementing agent works against.
      placeholder: |
        - [ ] ...
        - [ ] Regression test added covering this case
    validations:
      required: true
